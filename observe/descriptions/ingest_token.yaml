description:
  An ingest token authenticates data coming into Observe. It can be flexibly routed using a package
  header, or hardcoded to a list of datastreams.
schema:
  name:
    The name of the ingest token, should be unique within a workspace.
  datastream_ids:
    Unlike datastream tokens, an ingest token is not associated to any specific datastream in
    Observe. You can specify a list of datastreams to route data towards here, and any data will
    be routed purely by type.

    Alternatively, you can leave this blank and specify the package you would like to route towards
    with the 'X-Observe-Target-Package' header in your request.
